<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/login.css"
 

</head>
<body>

  <div class="login-container">
    <!-- Nome da sua loja -->
    <div class="brand-title">GH Store01</div>
    <div class="brand-subtitle">Acesse sua conta para gerenciar seus pedidos</div>

    <form action="#">
      <!-- Campo de E-mail -->
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" >
      </div>

      <!-- Campo de Senha -->
      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <!-- Botão personalizado com o seu efeito -->
      <button type="submit" class="btn-login">Entrar</button>
    </form>

    <!-- Links de navegação adicionais -->
    <div class="extra-links">
      <a href="#">Esqueceu sua senha?</a>
      <a class="btn-login" href="../index.html">← Voltar para a Home</a> <!-- Redireciona para sua página principal -->
    </div>
  </div>

</body>
</html>
